<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - bot-Fabri</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #f5f5f7;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #08080a;
            position: relative;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(8, 8, 10, 0.5), rgba(8, 8, 10, 0.8)), url('backgroundgarcia.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            pointer-events: none;
        }

        header {
            height: 70px;
            padding: 0 20px;
            line-height: 70px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(8, 8, 10, 0.7);
            backdrop-filter: blur(12px);
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 19px;
            font-weight: 600;
            text-decoration: none;
            color: #ffffff;
            cursor: pointer;
            letter-spacing: -0.3px;
            transition: transform 0.2s ease;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .logo::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 3px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.6);
            transform: rotate(45deg);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .logo:hover::before {
            transform: rotate(135deg);
            background: linear-gradient(135deg, #6366f1, #a855f7);
        }

        .logo span {
            background: linear-gradient(90deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            position: relative;
        }

        @media (max-width: 360px) {
            .logo {
                font-size: 17px;
                gap: 6px;
            }

            .logo::before {
                width: 8px;
                height: 8px;
            }
        }

        .chat-viewport {
            flex: 1 1 auto;
            overflow-y: auto;
            padding: 15px 12px;
            scroll-behavior: smooth;
            z-index: 1;
            -webkit-overflow-scrolling: touch;
            /* Ottimizzazione scorrimento su iOS */
        }

        .chat-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .welcome-hero {
            text-align: center;
            padding: 30px 10px;
        }

        .welcome-hero h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(180deg, #ffffff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message-row {
            width: 100%;
            display: flex;
        }

        .user-row {
            justify-content: flex-end;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .user-row .message-card {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            background-color: #1f2937;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.05);
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: anywhere;
            font-size: 14.5px;
            line-height: 1.4;
            backdrop-filter: blur(4px);
        }

        .bot-container {
            display: flex;
            max-width: 95%;
            gap: 10px;
            align-items: flex-start;
        }

        .bot-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-image: url('garcia.jpg');
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .bot-card {
            background: rgba(255, 255, 255, 0.08);
            color: #f5f5f7;
            padding: 10px 14px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: anywhere;
            font-size: 14.5px;
            line-height: 1.4;
            backdrop-filter: blur(8px);
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 20px;
            padding: 0 4px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
            opacity: 0.4;
            animation: pulse 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.4;
            }

            50% {
                transform: scale(1.3);
                opacity: 1;
            }
        }

        .input-bar-container {
            padding: 12px 10px 24px 10px;
            background: rgba(8, 8, 10, 0.85);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            z-index: 10;
            width: 100%;
        }

        .input-bar-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            min-height: 46px;
            align-items: center;
            padding: 0 4px 0 14px;
        }

        .input-bar-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 14.5px;
            outline: none;
            height: 40px;
            padding-right: 8px;
        }

        .input-bar-wrapper button {
            height: 38px;
            padding: 0 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 19px;
            font-weight: 600;
            font-size: 13.5px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .input-bar-wrapper button:disabled {
            background: rgba(255, 255, 255, 0.2);
            color: #9ca3af;
            cursor: not-allowed;
        }

        #scrollAnchor {
            height: 1px;
            width: 100%;
            clear: both;
        }

        @media (min-width: 600px) {
            header {
                padding: 0 40px;
            }

            .chat-viewport {
                padding: 40px 20px;
            }

            .welcome-hero h1 {
                font-size: 42px;
            }

            .input-bar-container {
                padding: 20px;
                background: linear-gradient(to top, rgba(8, 8, 10, 0.95) 40%, rgba(8, 8, 10, 0));
            }

            .input-bar-wrapper {
                height: 52px;
                border-radius: 28px;
                padding: 0 6px 0 16px;
            }

            .input-bar-wrapper input {
                font-size: 15px;
            }

            .input-bar-wrapper button {
                height: 40px;
                padding: 0 20px;
                border-radius: 20px;
                font-size: 14.5px;
            }

            .user-row .message-card {
                max-width: 75%;
                font-size: 15px;
            }

            .bot-container {
                max-width: 85%;
            }

            .bot-card {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <header>
        <a href="https://franca.bot-fabri.uk/" class="logo">bot-fabri<span>.uk</span></a>
    </header>
    <div class="chat-viewport" id="chatViewport">
        <div class="chat-wrapper" id="chatWrapper">
            <div class="welcome-hero" id="welcomeHero">
                <h1>Sono la TUA...di Penelope!</h1>
            </div>
        </div>
        <div id="scrollAnchor"></div>
    </div>
    <div class="input-bar-container">
        <div class="input-bar-wrapper">
            <input type="text" id="inputMessaggio" placeholder="Dimmi tutto Baby Girl ❤️" onkeypress="handleKeyPress(event)">
            <button id="btnInvia" onclick="inviaAWorker()">Invia</button>
        </div>
    </div>

    <script>
        let cronologiaChat = [];

        window.addEventListener("beforeunload", () => {
            if (cronologiaChat.length === 0) return;
            const logData = JSON.stringify({ timestamp: new Date().toISOString(), sessione: cronologiaChat });
            navigator.sendBeacon("/api/log", logData);
        });

        function handleKeyPress(event) { if (event.key === "Enter") inviaAWorker(); }

        function forzaScorrimento() {
            document.getElementById("scrollAnchor").scrollIntoView({ behavior: "smooth", block: "end" });
        }

        function avviaStreamingTesto(elemento, testo, callback) {
            const parole = testo.split(" ");
            let i = 0;
            elemento.innerHTML = "";

            const intervallo = setInterval(() => {
                if (i < parole.length) {
                    elemento.innerHTML += (i === 0 ? "" : " ") + parole[i];
                    i++;
                    forzaScorrimento();
                } else {
                    clearInterval(intervallo);
                    forzaScorrimento();
                    if (callback) callback();
                }
            }, 45);
        }

        async function inviaAWorker() {
            const input = document.getElementById("inputMessaggio");
            const btn = document.getElementById("btnInvia");
            const wrapper = document.getElementById("chatWrapper");
            const hero = document.getElementById("welcomeHero");
            const testo = input.value.trim();
            if (!testo) return;

            if (hero) hero.style.display = "none";
            input.disabled = true; btn.disabled = true;
            cronologiaChat.push({ role: "user", content: testo });

            wrapper.innerHTML += `<div class="message-row user-row"><div class="message-card">${testo}</div></div>`;
            input.value = "";
            setTimeout(forzaScorrimento, 50);

            const idCasuale = "bot-" + Date.now();
            wrapper.innerHTML += `
                <div class="message-row bot-row">
                    <div class="bot-container">
                        <div class="bot-avatar"></div>
                        <div class="bot-card" id="${idCasuale}">
                            <div class="typing-indicator"><span></span><span></span><span></span></div>
                        </div>
                    </div>
                </div>`;
            setTimeout(forzaScorrimento, 50);

            try {
                const res = await fetch("/api/chatfranca", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chatCompleta: cronologiaChat })
                });
                const dati = await res.json();
                cronologiaChat.push({ role: "assistant", content: dati.risposta });

                const elementoCard = document.getElementById(idCasuale);
                avviaStreamingTesto(elementoCard, dati.risposta, () => {
                    input.disabled = false; btn.disabled = false; input.focus();
                    setTimeout(forzaScorrimento, 50);
                });

            } catch (err) {
                const elementoCard = document.getElementById(idCasuale);
                elementoCard.innerHTML = `<span style="color: #ef4444;">Errore di comunicazione con il backend.</span>`;
                input.disabled = false; btn.disabled = false; input.focus();
                setTimeout(forzaScorrimento, 50);
            }
        }
    </script>
</body>

</html>
